<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退休定投复利计算器-增强版</title>
    <style>
        :root {
            --primary-blue: #3b82f6;
            --primary-green: #16a34a;
            --primary-orange: #f59e0b;
            --primary-red: #dc2626;
            --primary-purple: #7c3aed;
            --bg-gray: #f0f4f8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 95%;
            max-width: 950px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .title-area h1 { margin: 0; font-size: 24px; color: #333; }

        .summary-stats { display: flex; gap: 20px; text-align: right; }
        .stat-item { font-size: 13px; color: #666; }
        .stat-item strong { display: block; font-size: 18px; color: #222; }

        .insight {
            font-size: 12px; color: #777; background: #f8fafc;
            padding: 10px 15px; border-radius: 8px; margin-bottom: 40px;
            border-left: 4px solid #cbd5e1;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .card {
            border: 2px solid #eee;
            border-radius: 24px;
            padding: 25px 10px;
            text-align: center;
            background: #fff;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); }
        .card h3 { font-size: 15px; margin-top: 0; color: #444; }
        .card .icon { font-size: 24px; margin-bottom: 10px; }
        .card .total-amount { font-size: 19px; font-weight: 800; margin: 15px 0; }
        .card .details { font-size: 11px; color: #999; line-height: 1.6; }

        .card-blue { border-color: var(--primary-blue); color: var(--primary-blue); }
        .card-green { border-color: var(--primary-green); color: var(--primary-green); }
        .card-orange { border-color: var(--primary-orange); color: var(--primary-orange); }
        .card-red { border-color: var(--primary-red); color: var(--primary-red); }
        .card-purple { border-color: var(--primary-purple); color: var(--primary-purple); }

        hr { border: none; border-top: 1px solid #eee; margin: 30px 0; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px 50px;
        }

        .control-item { display: flex; align-items: center; gap: 15px; }
        .control-item label { font-size: 13px; color: #555; width: 130px; }
        input[type=range] { flex-grow: 1; cursor: pointer; }

        .value-input {
            background: #f1f5f9;
            padding: 6px 10px;
            border-radius: 10px;
            width: 82px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #e2e8f0;
            outline: none;
            color: #0f172a;
        }

        .value-input:focus {
            border-color: #93c5fd;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
            background: #fff;
        }

        .value-input::-webkit-outer-spin-button,
        .value-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .value-input[type=number] {
            -moz-appearance: textfield;
        }

        @media (max-width: 850px) {
            .cards-grid { grid-template-columns: repeat(3, 1fr); }
            .controls { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="title-area">
            <h1>退休定投复利计算器</h1>
        </div>
        <div class="summary-stats">
            <div class="stat-item">25岁开始比35岁多赚<strong id="cost-gap">0.00 万</strong></div>
            <div class="stat-item">资产放大倍数<strong id="multi-rate">0.0 倍</strong></div>
        </div>
    </header>

    <p class="insight">
        计算规则：一次性投入在初始年份进入账户，每月定投在月末进入，按月计息，按年展示。
    </p>

    <div class="cards-grid" id="cards-container"></div>

    <hr>

    <div class="controls">
        <div class="control-item">
            <label>初始一次投入 (万元)</label>
            <input type="range" id="input-lump" min="0" max="200" step="1" value="80">
            <input class="value-input" type="number" id="val-lump" min="0" max="200" step="1" value="10">
        </div>
        
        <div class="control-item">
            <label>每月定投金额 (元)</label>
            <input type="range" id="input-monthly" min="0" max="10000" step="100" value="2000">
            <input class="value-input" type="number" id="val-monthly" min="0" max="10000" step="100" value="2000">
        </div>

        <div class="control-item">
            <label>退休年龄 (岁)</label>
            <input type="range" id="input-retire" min="50" max="75" step="1" value="65">
            <input class="value-input" type="number" id="val-retire" min="50" max="75" step="1" value="65">
        </div>

        <div class="control-item">
            <label>预期年化收益 (%)</label>
            <input type="range" id="input-rate" min="1" max="15" step="0.1" value="10">
            <input class="value-input" type="number" id="val-rate" min="1" max="15" step="0.1" value="7.0">
        </div>
    </div>
</div>

<script>
    const startAges = [
        { age: 25, style: 'card-blue' },
        { age: 30, style: 'card-green' },
        { age: 35, style: 'card-orange' },
        { age: 40, style: 'card-red' },
        { age: 45, style: 'card-purple' }
    ];

    function update() {
        // 获取输入值
        const lumpSum = parseFloat(document.getElementById('input-lump').value) * 10000;
        const monthly = parseFloat(document.getElementById('input-monthly').value);
        const retireAge = parseInt(document.getElementById('input-retire').value);
        const annualRate = parseFloat(document.getElementById('input-rate').value) / 100;
        const monthlyRate = annualRate / 12;

        // 更新输入框显示
        document.getElementById('val-lump').value = document.getElementById('input-lump').value;
        document.getElementById('val-monthly').value = document.getElementById('input-monthly').value;
        document.getElementById('val-retire').value = document.getElementById('input-retire').value;
        document.getElementById('val-rate').value = (annualRate * 100).toFixed(1);

        const container = document.getElementById('cards-container');
        container.innerHTML = '';

        let results = [];

        startAges.forEach(item => {
            const years = retireAge - item.age;
            if (years < 0) return; // 退休年龄小于开始年龄则不显示

            const months = years * 12;
            const totalMonthlyPrincipal = monthly * months;
            const totalPrincipal = lumpSum + totalMonthlyPrincipal;
            
            // 1. 初始一次性投入的终值: FV1 = PV * (1 + r)^n
            const fvLumpSum = lumpSum * Math.pow(1 + monthlyRate, months);

            // 2. 每月定投的终值: FV2 = P * [((1 + r)^n - 1) / r]
            let fvMonthly = 0;
            if (monthlyRate > 0) {
                fvMonthly = monthly * (Math.pow(1 + monthlyRate, months) - 1) / monthlyRate;
            } else {
                fvMonthly = totalMonthlyPrincipal;
            }

            const total = fvLumpSum + fvMonthly;
            results.push({ total, principal: totalPrincipal, years });

            const card = document.createElement('div');
            card.className = `card ${item.style}`;
            card.innerHTML = `
                <div class="icon">💰</div>
                <h3>${item.age} 岁开始</h3>
                <div class="total-amount">${(total / 10000).toFixed(2)} 万</div>
                <div class="details">
                    投资 ${years} 年<br>
                    总本金: ${(totalPrincipal / 10000).toFixed(2)} 万
                </div>
            `;
            container.appendChild(card);
        });

        // 摘要计算 (25岁 vs 35岁)
        if (results.length >= 3) {
            const costGap = (results[0].total - results[2].total) / 10000;
            const multi = results[0].total / results[0].principal;
            document.getElementById('cost-gap').innerText = costGap.toFixed(2) + " 万";
            document.getElementById('multi-rate').innerText = multi.toFixed(1) + " 倍";
        }
    }

    function clampValue(value, min, max) {
        return Math.min(max, Math.max(min, value));
    }

    function bindRangeAndInput(rangeId, inputId, digits = 0) {
        const range = document.getElementById(rangeId);
        const input = document.getElementById(inputId);
        const min = parseFloat(range.min);
        const max = parseFloat(range.max);
        const step = parseFloat(range.step || '1');

        range.addEventListener('input', () => {
            const numeric = parseFloat(range.value);
            input.value = digits > 0 ? numeric.toFixed(digits) : String(Math.round(numeric));
            update();
        });

        input.addEventListener('input', () => {
            const numeric = parseFloat(input.value);
            if (!Number.isFinite(numeric)) {
                return;
            }
            const clamped = clampValue(numeric, min, max);
            range.value = step < 1 ? clamped.toFixed(digits) : String(Math.round(clamped / step) * step);
            update();
        });

        input.addEventListener('blur', () => {
            const numeric = Number.isFinite(parseFloat(input.value)) ? parseFloat(input.value) : parseFloat(range.value);
            const clamped = clampValue(numeric, min, max);
            const normalized = step < 1 ? clamped.toFixed(digits) : String(Math.round(clamped / step) * step);
            range.value = normalized;
            input.value = normalized;
            update();
        });
    }

    bindRangeAndInput('input-lump', 'val-lump', 0);
    bindRangeAndInput('input-monthly', 'val-monthly', 0);
    bindRangeAndInput('input-retire', 'val-retire', 0);
    bindRangeAndInput('input-rate', 'val-rate', 1);

    update();
</script>

</body>
</html>
